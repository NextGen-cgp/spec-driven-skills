context_analysis_routing:
  default_next_skill: user-story-enrichment

  state_outputs:
    context_ready:
      status: CONTEXT_ANALYSIS_READY
      meaning: There is enough context to continue the SDD flow.

    context_partial:
      status: CONTEXT_ANALYSIS_PARTIAL
      meaning: There is enough context to move forward cautiously, but there are uncertainties.

    needs_more_context:
      status: NEEDS_MORE_CONTEXT
      meaning: Critical information is missing to generate a reliable spec.

    blocked_missing_repository:
      status: BLOCKED_BY_MISSING_REPOSITORY_ACCESS
      meaning: The repository or required files could not be analyzed.

  route_rules:
    vague_request:
      when:
        - original_request_is_vague: true
        - acceptance_criteria_missing: true
      route_to: user-story-enrichment
      reason: The story must be refined before being technically specified.

    clear_technical_request:
      when:
        - original_request_is_specific: true
        - affected_modules_identified: true
      route_to: technical-specification
      reason: The change already has sufficient functional clarity and requires technical design.

    affects_api:
      when:
        - affected_area_contains: api
      route_to: api-contract-specification
      reason: It is necessary to define a contract between frontend, backend or external consumers.

    affects_database:
      when:
        - affected_area_contains: database
      route_to: migration-rollback-planning
      reason: It is necessary to define migration, compatibility and rollback.

    affects_auth_or_roles:
      when:
        - affected_area_contains_any:
            - authentication
            - authorization
            - roles
            - permissions
      route_to: security-permissions-review
      reason: The change requires early permissions and security review.

    missing_repo_access:
      when:
        - repository_accessible: false
      route_to: blocked
      reason: Without access to the repository, reliable context analysis cannot be done.

  orchestrator_update:
    required_fields:
      - current_state
      - last_completed_skill
      - recommended_next_skill
      - context_confidence
      - blocking_issues
